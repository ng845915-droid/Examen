<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - EuroVanguard Travels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="header"></div>

<section class="container py-5 mt-5">
    <h2 class="text-center mb-5 fw-bold">Contáctanos</h2>

    <div class="row g-4">

        <!-- Información -->
        <div class="col-md-5">
            <div class="card shadow border-0 p-4">
                <h4 class="mb-4">Información</h4>

                <p>
                    <i class="bi bi-telephone-fill text-warning"></i>
                    +52 (55) 1234-5678
                </p>

                <p>
                    <i class="bi bi-envelope-fill text-warning"></i>
                    info@eurovanguardtravels.com
                </p>

                <p>
                    <i class="bi bi-geo-alt-fill text-warning"></i>
                    Ciudad de México
                </p>

                <p>
                    <i class="bi bi-clock-fill text-warning"></i>
                    Lunes a Viernes: 9 AM - 7 PM
                </p>
            </div>
        </div>

        <!-- Formulario -->
        <div class="col-md-7">
            <div class="card shadow border-0 p-4">
                <h4 class="mb-4">Envíanos un mensaje</h4>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" placeholder="Tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" placeholder="Tu correo electrónico">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje"></textarea>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        Enviar mensaje
                    </button>
                </form>
            </div>
        </div>

    </div>
</section>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
